<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pulse Brief</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="서비스 메뉴">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">PB</span>
          <div>
            <strong>Pulse Brief</strong>
            <span>실시간 이슈 요약</span>
          </div>
        </div>

        <nav class="nav-list" aria-label="대시보드 보기">
          <button class="nav-item active" type="button" data-view="briefing">
            <span aria-hidden="true">⌁</span> 이슈 요약
          </button>
          <button class="nav-item" type="button" data-view="feed">
            <span aria-hidden="true">⌕</span> 뉴스 검색
          </button>
        </nav>

        <section class="source-panel" aria-labelledby="source-title">
          <h2 id="source-title">수집 소스</h2>
          <label><input type="checkbox" checked /> 국내 주요 뉴스</label>
          <label><input type="checkbox" checked /> 글로벌 미디어</label>
          <label><input type="checkbox" checked /> 정책/공공기관</label>
          <label><input type="checkbox" checked /> 방송사 RSS</label>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">2026.06.08 · 서울 기준</p>
            <h1>지금 중요한 이슈를 한눈에</h1>
          </div>
          <div class="top-actions">
            <button class="icon-button" id="refreshButton" type="button" aria-label="새로고침" title="새로고침">↻</button>
          </div>
        </header>

        <section class="metric-grid hidden" aria-label="뉴스검색 지표">
          <article class="metric">
            <span>전체 뉴스</span>
            <strong id="topicCount">0</strong>
            <small>선택한 카테고리 기준</small>
          </article>
          <article class="metric">
            <span>금일 뉴스</span>
            <strong id="todayCount">0</strong>
            <small>오늘 발행된 기사 기준</small>
          </article>
          <article class="metric">
            <span>금일 중요도 평균</span>
            <strong id="impactScore">0.0</strong>
            <small>오늘 뉴스 중요도 평균</small>
          </article>
          <article class="metric">
            <span>업데이트</span>
            <strong id="updateTime">--:--</strong>
            <small>마지막 화면 갱신 시각</small>
          </article>
        </section>

        <div class="content-grid">
          <div class="briefing-panel view-panel active" data-panel="briefing">
            <div id="weeklyStats" class="weekly-stats" aria-label="선택 카테고리 지표"></div>
            <div id="weeklyCategoryTabs" class="weekly-tabs" aria-label="주간 이슈 카테고리"></div>

            <section class="daily-box" aria-labelledby="daily-summary-title">
              <div class="section-head compact">
                <div>
                  <p class="eyebrow">Yesterday Brief</p>
                  <h2 id="daily-summary-title">전날 이슈 요약</h2>
                </div>
              </div>
              <div id="categorySummary" class="daily-summary category-summary" aria-live="polite"></div>
            </section>

            <section class="weekly-box" aria-labelledby="weekly-summary-title">
              <div class="section-head compact">
                <div>
                  <p class="eyebrow">Weekly Pulse</p>
                  <h2 id="weekly-summary-title">주간 이슈 요약</h2>
                </div>
              </div>
              <div id="weeklySummary" class="weekly-summary"></div>
            </section>
          </div>

          <section class="feed-column view-panel" data-panel="feed" aria-labelledby="feed-title">
            <div class="section-head">
              <div>
                <p class="eyebrow">Live Feed</p>
                <h2 id="feed-title">이슈 피드</h2>
              </div>
              <div class="search-wrap">
                <span aria-hidden="true">⌕</span>
                <input id="searchInput" type="search" placeholder="키워드, 출처, 분야 검색" />
              </div>
            </div>
            <div class="feed-controls">
              <div id="categoryFilters" class="segmented" role="tablist" aria-label="카테고리 필터"></div>
            </div>
            <div id="topPaginationControls" class="pagination-controls pagination-controls-top" aria-label="이슈 피드 상단 페이지 이동"></div>
            <div id="newsList" class="news-list" aria-live="polite"></div>
            <div id="paginationControls" class="pagination-controls" aria-label="이슈 피드 페이지 이동"></div>
          </section>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
